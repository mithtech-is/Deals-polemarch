<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}UnlistedPulse Admin{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">
  <div class="flex">
    <!-- Sidebar -->
    <aside class="w-56 bg-gray-900 text-gray-300 min-h-screen fixed">
      <div class="p-4 border-b border-gray-800">
        <a href="/admin" class="text-lg font-bold text-white">Unlisted<span class="text-blue-400">Pulse</span></a>
        <p class="text-xs text-gray-500 mt-1">Admin Panel</p>
      </div>
      <nav class="p-3 space-y-1">
        <a href="/admin" class="block px-3 py-2 rounded text-sm hover:bg-gray-800 hover:text-white {% if active == 'dashboard' %}bg-gray-800 text-white{% endif %}">Dashboard</a>
        <a href="/admin/companies" class="block px-3 py-2 rounded text-sm hover:bg-gray-800 hover:text-white {% if active == 'companies' %}bg-gray-800 text-white{% endif %}">Companies</a>
        <a href="/admin/articles" class="block px-3 py-2 rounded text-sm hover:bg-gray-800 hover:text-white {% if active == 'articles' %}bg-gray-800 text-white{% endif %}">Articles</a>
        <a href="/admin/runs" class="block px-3 py-2 rounded text-sm hover:bg-gray-800 hover:text-white {% if active == 'runs' %}bg-gray-800 text-white{% endif %}">Scrape Runs</a>
        <div class="pt-3 mt-3 border-t border-gray-800">
          <form method="post" action="/admin/scrape">
            <button type="submit" class="w-full px-3 py-2 bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium rounded transition-colors">Run Scraper</button>
          </form>
        </div>
      </nav>
    </aside>

    <!-- Main Content -->
    <main class="ml-56 flex-1 p-6">
      {% block content %}{% endblock %}
    </main>
  </div>
</body>
</html>
