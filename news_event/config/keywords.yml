keyword_groups:
  unlisted:
    query: '"unlisted shares" OR "unlisted stock" OR "pre-IPO shares" OR "pre IPO India"'
    category: unlisted

  ipo_pipeline:
    query: '"upcoming IPO" OR "DRHP filed" OR "IPO approved SEBI" OR "IPO listing"'
    category: ipo

  grey_market:
    query: '"grey market premium" OR "IPO GMP" OR "kostak rate"'
    category: gmp

alerts:
  emailit_api_url: "https://api.emailit.com/v2/emails"
  sender: "alerts@unlistedpulse.com"
  subscribers:
    - "your@email.com"
  thresholds:
    gmp_change_percent: 20
  top_tier_sources:
    - "Economic Times"
    - "Moneycontrol"
    - "LiveMint"
    - "BusinessToday"
    - "Business Standard"
    - "NDTV Profit"
